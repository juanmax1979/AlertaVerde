server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy al backend (dentro de la red de Docker)
  location /api/ {
    proxy_pass http://backend:3500;  
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

   # >>> Muy importante para media con prefijo /api <<<
  # /api/static/* en Nginx → /static/* en el backend
  location /api/static/ {
    proxy_pass http://backend:3500/static/;   # con barra final → reescribe /api/static/... a /static/...
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Opcionalmente mejora streaming de video:
    proxy_request_buffering off;
    proxy_buffering on;
  }

   # 📂 Archivos estáticos subidos (imagenes, adjuntos)
  location /static/ {
    proxy_pass http://backend:3500;   # SIN barra final → preserva /static
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

   # SPA
  location / {
    try_files $uri $uri/ /index.html;
  }
}
